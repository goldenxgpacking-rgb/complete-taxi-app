name: complete_taxi_app
description: "Complete taxi booking app with rider and driver modules"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  
  # Navigation
  go_router: ^14.8.1
  
  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  
  # Firebase
  firebase_core: ^3.13.0
  firebase_auth: ^5.5.3
  cloud_firestore: ^5.6.5
  firebase_storage: ^12.4.5
  firebase_messaging: ^15.2.3
  
  # Maps & Location
  google_maps_flutter: ^2.10.1
  geolocator: ^13.0.4
  geocoding: ^3.0.0
  flutter_polyline_points: ^2.1.0
  
  # UI Components
  cupertino_icons: ^1.0.8
  flutter_native_splash: ^2.4.4
  smooth_page_indicator: ^1.2.1
  
  # Image & Media
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1
  
  # Utilities
  intl: ^0.19.0
  shared_preferences: ^2.5.2
  url_launcher: ^6.3.1
  package_info_plus: ^8.2.0
  
  # Face Recognition (for driver)
  google_mlkit_face_detection: ^0.13.2
  
  # Notifications
  flutter_local_notifications: ^18.0.1
  
  # Payment (Stripe example)
  flutter_stripe: ^11.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  riverpod_generator: ^2.6.1
  build_runner: ^2.4.13

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/privacy_policy.html
    - assets/terms_of_service.html
